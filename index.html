<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Test</title>
	<link rel="stylesheet" href="https://beanos.dev/styles.css">
	<script>
		var ifloaded = 0
		setTimeout(function(){
			ifloaded += 1
		},1500);

		function hover() {
			if(ifloaded === 1) {
				document.getElementById('pfp').className = 'loaded'
			}	
		}
	</script>
	<script>
		var dob = new Date("02/18/2006");
		var month_diff = Date.now() - dob.getTime();
		var age_dt = new Date(month_diff);
		var year = age_dt.getUTCFullYear();
		var age = Math.abs(year - 1970);
		document.getElementById('age').innerText = "I'm a " + age + " year old developer from Norway."
	</script>
</head>
<body class="preload">
	<div id="background"></div>
	<h1 id="main"><i>Hey, I'm Beanos</i></h1>
	<img src="assets/beanos.png" id="pfp" class="loading"onmouseover="hover(this)">
	<p id="age">Loading.</p>
	
</body>
</html>
