<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Test</title>
	<link rel="stylesheet" href="https://beanos.dev/styles.css">
	<script>
		var ifloaded = 0
		setTimeout(function(){
			ifloaded += 1
		},1500);

		function hover() {
			if(ifloaded === 1) {
				document.getElementById('pfp').className = 'loaded'
			}	
		}
	</script>
</head>
<body class="preload">
	<div id="background"></div>
	<h1 id="main"><i>Hey, I'm Beanos</i></h1>
	<img src="assets/beanos.png" id="pfp" class="loading"onmouseover="hover(this)">
	<p id="age">I'm a 17 year old developer from Norway. This website is pretty new, and will be updated frequently.</p>
</body>
</html>
